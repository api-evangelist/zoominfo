}

type ContactEmail {
  address: EmailAddress
  type: String
  isPrimary: Boolean
  isVerified: Boolean
  deliverability: String
}

type ContactPhone {
  number: String
  type: String
  isPrimary: Boolean
  countryCode: String
  extension: String
}

type ContactLinkedIn {
  profileUrl: String
  handle: String
}

