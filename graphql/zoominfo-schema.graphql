"""
ZoomInfo GraphQL Schema
Conceptual schema representing the ZoomInfo B2B data and intelligence API.
Source: https://developer.zoominfo.com / https://api-docs.zoominfo.com
"""

# -----------------------------------------------------------------------
# Root operations
# -----------------------------------------------------------------------

type Query {
  # Contact operations
  searchContacts(query: SearchQuery!): ContactResults
  enrichContact(input: EnrichDetails!): EnrichResult
  bulkEnrichContacts(input: BulkEnrich!): BulkEnrichResults

  # Company operations
  searchCompanies(query: SearchQuery!): CompanyResults
  enrichCompany(input: EnrichDetails!): EnrichResult
  bulkEnrichCompanies(input: BulkEnrich!): BulkEnrichResults

  # Person operations
  searchPeople(query: SearchQuery!): PersonResults
  enrichPerson(input: EnrichDetails!): EnrichResult

  # Intent
  searchIntent(query: SearchQuery!): IntentDetails
  enrichIntent(input: EnrichDetails!): IntentDetails

  # News
  searchNews(query: SearchQuery!): SearchResults
  enrichNews(input: EnrichDetails!): NewsDetails

  # Scoop
  searchScoops(query: SearchQuery!): SearchResults
  enrichScoop(input: EnrichDetails!): ScoopDetails

  # Technology
  enrichTechnology(input: EnrichDetails!): TechDetails

  # Location
  enrichLocation(input: EnrichDetails!): LocationDetails

  # Lookup
  domainLookup(input: DomainLookup!): CompanyDetails
  ipLookup(ipAddress: String!): CompanyDetails

  # Corporate hierarchy / org chart
  corporateHierarchy(companyId: ID!): FamilyTree
  orgChart(companyId: ID!): OrgChartNode

  # Bulk job status
  bulkJobStatus(jobId: ID!): BulkJobStatus
  bulkJobResults(jobId: ID!): BulkEnrichResults

  # Webhooks
  listWebhooks: [Webhook]
  getWebhook(id: ID!): Webhook

  # API management
  getAPIKey: APIKey
  getToken: Token
  listSegments: [Segment]
  getAudience(segmentId: ID!): AudienceDetails
  getPageInfo(cursor: String): PageInfo

  # Compliance
  complianceData(personId: ID!): ComplianceRecord

  # Hashtags
  enrichHashtags(domain: String!): [Hashtag]
}

type Mutation {
  # Authentication
  authenticate(username: String!, password: String!): Token
  refreshToken(token: String!): Token

  # Bulk jobs
  submitBulkContactSearch(input: BulkEnrich!): BulkJobStatus
  submitBulkCompanySearch(input: BulkEnrich!): BulkJobStatus
  submitBulkContactEnrich(input: BulkEnrich!): BulkJobStatus
  submitBulkCompanyEnrich(input: BulkEnrich!): BulkJobStatus

  # Webhooks
  createWebhook(input: WebhookInput!): Webhook
  updateWebhook(id: ID!, input: WebhookInput!): Webhook
  deleteWebhook(id: ID!): Boolean
  validateWebhookURL(url: String!): Boolean

  # Integration
  createIntegration(input: IntegrationInput!): Integration
  updateIntegration(id: ID!, input: IntegrationInput!): Integration
  deleteIntegration(id: ID!): Boolean
}

# -----------------------------------------------------------------------
# Contact domain
# -----------------------------------------------------------------------

type Contact {
  id: ID!
  firstName: String
  lastName: String
  fullName: String
  jobTitle: String
  jobFunction: String
  managementLevel: String
  department: String
