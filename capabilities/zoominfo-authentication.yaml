naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Authentication
  description: 'ZoomInfo — Authentication. 1 operations. Lead operation: Zoominfo Authenticate. Self-contained Naftiko capability
    covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-authentication
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: authenticate
      path: /authenticate
      operations:
      - name: authenticate
        method: POST
        description: Zoominfo Authenticate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-authentication-rest
    port: 8080
    description: REST adapter for ZoomInfo — Authentication. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/authenticate
      name: authenticate
      description: REST surface for authenticate.
      operations:
      - method: POST
        name: authenticate
        description: Zoominfo Authenticate
        call: zoominfo-authentication.authenticate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Authentication. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-authenticate
      description: Zoominfo Authenticate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zoominfo-authentication.authenticate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
