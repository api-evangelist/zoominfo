naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Contact Search
  description: 'ZoomInfo — Contact Search. 3 operations. Lead operation: Zoominfo Contact Search Inputs. Self-contained Naftiko
    capability covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Contact Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-contact-search
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Contact Search business capability. Self-contained, no shared references.
    resources:
    - name: lookup-inputfields-contact-search
      path: /lookup/inputfields/contact/search
      operations:
      - name: contactsearchinputs
        method: GET
        description: Zoominfo Contact Search Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-contact-search
      path: /lookup/outputfields/contact/search
      operations:
      - name: contactsearchoutputs
        method: GET
        description: Zoominfo Contact Search Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-contact
      path: /search/contact
      operations:
      - name: contactsearch
        method: POST
        description: Zoominfo Contact Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-contact-search-rest
    port: 8080
    description: REST adapter for ZoomInfo — Contact Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup/inputfields/contact/search
      name: lookup-inputfields-contact-search
      description: REST surface for lookup-inputfields-contact-search.
      operations:
      - method: GET
        name: contactsearchinputs
        description: Zoominfo Contact Search Inputs
        call: zoominfo-contact-search.contactsearchinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/contact/search
      name: lookup-outputfields-contact-search
      description: REST surface for lookup-outputfields-contact-search.
      operations:
      - method: GET
        name: contactsearchoutputs
        description: Zoominfo Contact Search Outputs
        call: zoominfo-contact-search.contactsearchoutputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/contact
      name: search-contact
      description: REST surface for search-contact.
      operations:
      - method: POST
        name: contactsearch
        description: Zoominfo Contact Search
        call: zoominfo-contact-search.contactsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-contact-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Contact Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-contact-search-inputs
      description: Zoominfo Contact Search Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-contact-search.contactsearchinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-contact-search-outputs
      description: Zoominfo Contact Search Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-contact-search.contactsearchoutputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-contact-search
      description: Zoominfo Contact Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zoominfo-contact-search.contactsearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
