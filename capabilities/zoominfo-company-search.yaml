naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Company Search
  description: 'ZoomInfo — Company Search. 3 operations. Lead operation: Zoominfo Company Search Inputs. Self-contained Naftiko
    capability covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Company Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-company-search
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Company Search business capability. Self-contained, no shared references.
    resources:
    - name: lookup-inputfields-company-search
      path: /lookup/inputfields/company/search
      operations:
      - name: companysearchinputs
        method: GET
        description: Zoominfo Company Search Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-company-search
      path: /lookup/outputfields/company/search
      operations:
      - name: companysearchoutputs
        method: GET
        description: Zoominfo Company Search Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-company
      path: /search/company
      operations:
      - name: companysearch
        method: POST
        description: Zoominfo Company Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-company-search-rest
    port: 8080
    description: REST adapter for ZoomInfo — Company Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup/inputfields/company/search
      name: lookup-inputfields-company-search
      description: REST surface for lookup-inputfields-company-search.
      operations:
      - method: GET
        name: companysearchinputs
        description: Zoominfo Company Search Inputs
        call: zoominfo-company-search.companysearchinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/company/search
      name: lookup-outputfields-company-search
      description: REST surface for lookup-outputfields-company-search.
      operations:
      - method: GET
        name: companysearchoutputs
        description: Zoominfo Company Search Outputs
        call: zoominfo-company-search.companysearchoutputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/company
      name: search-company
      description: REST surface for search-company.
      operations:
      - method: POST
        name: companysearch
        description: Zoominfo Company Search
        call: zoominfo-company-search.companysearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-company-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Company Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-company-search-inputs
      description: Zoominfo Company Search Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-company-search.companysearchinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-company-search-outputs
      description: Zoominfo Company Search Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-company-search.companysearchoutputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-company-search
      description: Zoominfo Company Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zoominfo-company-search.companysearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
