naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo Sales Prospecting
  description: Workflow for sales teams to find, qualify, and enrich prospect data. Combines contact search, company search,
    intent signals, and enrichment for targeted outreach.
  tags:
  - ZoomInfo
  - Sales Prospecting
  - Lead Generation
  - Contact Search
  - Company Search
  - Intent Data
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ZOOMINFO_USERNAME: ZOOMINFO_USERNAME
    ZOOMINFO_PASSWORD: ZOOMINFO_PASSWORD
capability:
