        method: POST
        path: /authenticate
        description: ZoomInfo Authenticate
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            username: '{{tools.username}}'
            password: '{{tools.password}}'
    - name: contact-search
      path: /search
      description: Contact search operations
      operations:
      - name: search-contacts
        method: POST
        path: /search/contact
        description: ZoomInfo Contact Search
        inputParameters: []
        outputRawFormat: json
        outputParameters:
