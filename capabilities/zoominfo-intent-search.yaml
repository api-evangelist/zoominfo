naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Intent Search
  description: 'ZoomInfo — Intent Search. 3 operations. Lead operation: Zoominfo Intent Search Inputs. Self-contained Naftiko
    capability covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Intent Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-intent-search
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Intent Search business capability. Self-contained, no shared references.
    resources:
    - name: lookup-inputfields-intent-search
      path: /lookup/inputfields/intent/search
      operations:
      - name: intentsearchinputs
        method: GET
        description: Zoominfo Intent Search Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-intent-search
      path: /lookup/outputfields/intent/search
      operations:
      - name: intentsearchoutputs
        method: GET
        description: Zoominfo Intent Search Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-intent
      path: /search/intent
      operations:
      - name: intentsearch
        method: POST
        description: Zoominfo Intent Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-intent-search-rest
    port: 8080
    description: REST adapter for ZoomInfo — Intent Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup/inputfields/intent/search
      name: lookup-inputfields-intent-search
      description: REST surface for lookup-inputfields-intent-search.
      operations:
      - method: GET
        name: intentsearchinputs
        description: Zoominfo Intent Search Inputs
        call: zoominfo-intent-search.intentsearchinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/intent/search
      name: lookup-outputfields-intent-search
      description: REST surface for lookup-outputfields-intent-search.
      operations:
      - method: GET
        name: intentsearchoutputs
        description: Zoominfo Intent Search Outputs
        call: zoominfo-intent-search.intentsearchoutputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/intent
      name: search-intent
      description: REST surface for search-intent.
      operations:
      - method: POST
        name: intentsearch
        description: Zoominfo Intent Search
        call: zoominfo-intent-search.intentsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-intent-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Intent Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-intent-search-inputs
      description: Zoominfo Intent Search Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-intent-search.intentsearchinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-intent-search-outputs
      description: Zoominfo Intent Search Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-intent-search.intentsearchoutputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-intent-search
      description: Zoominfo Intent Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zoominfo-intent-search.intentsearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
