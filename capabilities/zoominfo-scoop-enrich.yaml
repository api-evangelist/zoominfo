    resources:
    - name: enrich-scoop
      path: /enrich/scoop
      operations:
      - name: scoopenrich
        method: POST
        description: Zoominfo Scoop Enrich
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lookup-inputfields-scoop-enrich
      path: /lookup/inputfields/scoop/enrich
      operations:
      - name: scoopenrichinputs
