    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Scoop Enrich. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-scoop-enrich
      description: Zoominfo Scoop Enrich
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zoominfo-scoop-enrich.scoopenrich
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-scoop-enrich-inputs
