      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-scoop-enrich-rest
    port: 8080
    description: REST adapter for ZoomInfo — Scoop Enrich. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/enrich/scoop
      name: enrich-scoop
      description: REST surface for enrich-scoop.
      operations:
      - method: POST
        name: scoopenrich
        description: Zoominfo Scoop Enrich
        call: zoominfo-scoop-enrich.scoopenrich
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/inputfields/scoop/enrich
      name: lookup-inputfields-scoop-enrich
      description: REST surface for lookup-inputfields-scoop-enrich.
      operations:
      - method: GET
        name: scoopenrichinputs
        description: Zoominfo Scoop Enrich Inputs
        call: zoominfo-scoop-enrich.scoopenrichinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/scoop/enrich
      name: lookup-outputfields-scoop-enrich
      description: REST surface for lookup-outputfields-scoop-enrich.
      operations:
      - method: GET
        name: scoopenrichoutputs
        description: Zoominfo Scoop Enrich Outputs
