naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Compliance API
  description: 'ZoomInfo — Compliance API. 3 operations. Lead operation: Zoominfo Compliance. Self-contained Naftiko capability
    covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Compliance API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-compliance-api
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Compliance API business capability. Self-contained, no shared references.
    resources:
    - name: compliance
      path: /compliance
      operations:
      - name: compliance
        method: POST
        description: Zoominfo Compliance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lookup-inputfields-compliance-enrich
      path: /lookup/inputfields/compliance/enrich
      operations:
      - name: complianceinputs
        method: GET
        description: Zoominfo Compliance Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-compliance-enrich
      path: /lookup/outputfields/compliance/enrich
      operations:
      - name: complianceoutputs
        method: GET
        description: Zoominfo Compliance Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-compliance-api-rest
    port: 8080
    description: REST adapter for ZoomInfo — Compliance API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/compliance
      name: compliance
      description: REST surface for compliance.
      operations:
      - method: POST
        name: compliance
        description: Zoominfo Compliance
        call: zoominfo-compliance-api.compliance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/inputfields/compliance/enrich
      name: lookup-inputfields-compliance-enrich
      description: REST surface for lookup-inputfields-compliance-enrich.
      operations:
      - method: GET
        name: complianceinputs
        description: Zoominfo Compliance Inputs
        call: zoominfo-compliance-api.complianceinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/compliance/enrich
      name: lookup-outputfields-compliance-enrich
      description: REST surface for lookup-outputfields-compliance-enrich.
      operations:
      - method: GET
        name: complianceoutputs
        description: Zoominfo Compliance Outputs
        call: zoominfo-compliance-api.complianceoutputs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-compliance-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Compliance API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-compliance
      description: Zoominfo Compliance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zoominfo-compliance-api.compliance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-compliance-inputs
      description: Zoominfo Compliance Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-compliance-api.complianceinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-compliance-outputs
      description: Zoominfo Compliance Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-compliance-api.complianceoutputs
      outputParameters:
      - type: object
        mapping: $.
