            page: '{{tools.page}}'
    - name: contact-enrich
      path: /enrich
      description: Contact enrichment operations.
      operations:
      - name: enrich-contact
        method: POST
        path: /contact
        description: Enriches contact records with ZoomInfo data.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            matchPersonInput: '{{tools.match_person_input}}'
