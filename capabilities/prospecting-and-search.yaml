naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo Prospecting And Search
  description: Unified capability for B2B prospecting workflows combining contact search, company search, intent signals,
    news, and scoops. Used by sales development reps and account executives to identify and prioritize target accounts and
    contacts.
  tags:
  - ZoomInfo
  - Prospecting
  - Sales Intelligence
  - B2B Data
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ZOOMINFO_USERNAME: ZOOMINFO_USERNAME
    ZOOMINFO_PASSWORD: ZOOMINFO_PASSWORD
capability:
  consumes:
  - type: http
    namespace: zoominfo
    baseUri: https://api.zoominfo.com
    description: ZoomInfo B2B intelligence API for contact, company, intent, news, scoop, and technographic data.
    authentication:
      type: bearer
      token: '{{ZOOMINFO_JWT_TOKEN}}'
    resources:
    - name: authentication
      path: /
      description: Authentication operations for obtaining JWT tokens.
      operations:
      - name: authenticate
        method: POST
        path: /authenticate
        description: Return a valid JWT access token by inputting your ZoomInfo username and password.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            username: '{{tools.username}}'
            password: '{{tools.password}}'
    - name: contact-search
      path: /search
      description: Search and lookup operations for ZoomInfo contacts.
      operations:
      - name: search-contacts
        method: POST
        path: /contact
        description: Returns a list of contacts from ZoomInfo's data that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
      - name: get-contact-search-inputs
        method: GET
        path: /contact
        description: Returns the available input fields for contact search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-contact-search-outputs
        method: GET
        path: /contact
        description: Returns the available output fields for contact search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: company-search
      path: /search
      description: Search and lookup operations for ZoomInfo companies.
      operations:
      - name: search-companies
        method: POST
        path: /company
        description: Returns a list of companies from ZoomInfo's data that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
      - name: get-company-search-inputs
        method: GET
        path: /company
        description: Returns the available input fields for company search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-company-search-outputs
        method: GET
        path: /company
        description: Returns the available output fields for company search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scoop-search
      path: /search
      description: Search operations for ZoomInfo scoops (buying signals).
      operations:
      - name: search-scoops
        method: POST
        path: /scoop
        description: Returns a list of scoops that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
    - name: news-search
      path: /search
      description: Search operations for ZoomInfo news.
      operations:
      - name: search-news
        method: POST
        path: /news
        description: Returns a list of news articles that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
    - name: intent-search
      path: /search
      description: Search operations for ZoomInfo intent signals.
      operations:
      - name: search-intent
        method: POST
        path: /intent
        description: Returns intent signal data that meets the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
