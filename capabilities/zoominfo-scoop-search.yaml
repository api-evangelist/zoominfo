naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — Scoop Search
  description: 'ZoomInfo — Scoop Search. 3 operations. Lead operation: Zoominfo Scoop Search Inputs. Self-contained Naftiko
    capability covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - Scoop Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-scoop-search
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — Scoop Search business capability. Self-contained, no shared references.
    resources:
    - name: lookup-inputfields-scoop-search
      path: /lookup/inputfields/scoop/search
      operations:
      - name: scoopsearchinputs
        method: GET
        description: Zoominfo Scoop Search Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-scoop-search
      path: /lookup/outputfields/scoop/search
      operations:
      - name: scoopsearchoutputs
        method: GET
        description: Zoominfo Scoop Search Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-scoop
      path: /search/scoop
      operations:
      - name: scoopsearch
        method: POST
        description: Zoominfo Scoop Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-scoop-search-rest
    port: 8080
    description: REST adapter for ZoomInfo — Scoop Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup/inputfields/scoop/search
      name: lookup-inputfields-scoop-search
      description: REST surface for lookup-inputfields-scoop-search.
      operations:
      - method: GET
        name: scoopsearchinputs
        description: Zoominfo Scoop Search Inputs
        call: zoominfo-scoop-search.scoopsearchinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/scoop/search
      name: lookup-outputfields-scoop-search
      description: REST surface for lookup-outputfields-scoop-search.
      operations:
      - method: GET
        name: scoopsearchoutputs
        description: Zoominfo Scoop Search Outputs
        call: zoominfo-scoop-search.scoopsearchoutputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/scoop
      name: search-scoop
      description: REST surface for search-scoop.
      operations:
      - method: POST
        name: scoopsearch
        description: Zoominfo Scoop Search
        call: zoominfo-scoop-search.scoopsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-scoop-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — Scoop Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-scoop-search-inputs
      description: Zoominfo Scoop Search Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-scoop-search.scoopsearchinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-scoop-search-outputs
      description: Zoominfo Scoop Search Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-scoop-search.scoopsearchoutputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-scoop-search
      description: Zoominfo Scoop Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zoominfo-scoop-search.scoopsearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
