          value: $.
        body:
          type: json
          data:
            inputData: '{{tools.input_data}}'
      - name: get-bulk-job-status
        method: GET
        path: /job/status
        description: Returns the status of a bulk job.
        inputParameters:
        - name: jobId
          in: query
          type: string
          required: true
          description: The bulk job ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-bulk-job-results
        method: GET
        path: /job/results
        description: Returns the results of a completed bulk job.
        inputParameters:
        - name: jobId
          in: query
          type: string
          required: true
          description: The bulk job ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: compliance
      path: /compliance
      description: Compliance operations.
      operations:
      - name: check-compliance
        method: POST
        path: /
        description: Returns compliance data for specified contacts.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            matchPersonInput: '{{tools.match_person_input}}'
  exposes:
  - type: rest
    port: 8082
    namespace: monitoring-and-compliance-api
    description: Unified REST API for monitoring and compliance workflows.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: Webhook subscription management.
      operations:
      - method: POST
        name: create-webhook
        description: Create a new webhook subscription.
        call: zoominfo.create-webhook
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-webhooks
        description: List all webhook subscriptions.
        call: zoominfo.list-webhooks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhookId}
      name: webhook-management
      description: Individual webhook management.
      operations:
      - method: PUT
        name: update-webhook
        description: Update an existing webhook subscription.
        call: zoominfo.update-webhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-webhook
        description: Delete a webhook subscription.
        call: zoominfo.delete-webhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/validate
      name: webhook-validation
      description: Webhook target URL validation.
      operations:
      - method: POST
        name: validate-target-url
        description: Validate a webhook target URL.
        call: zoominfo.validate-target-url
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/subscription-types
      name: subscription-types
      description: Available webhook subscription types.
      operations:
      - method: GET
        name: get-subscription-types
        description: Get available webhook subscription types.
        call: zoominfo.get-subscription-types
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/compliance
      name: compliance
      description: Data compliance operations.
      operations:
      - method: POST
        name: check-compliance
        description: Check compliance status for specified contacts.
        call: zoominfo.check-compliance
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/usage
      name: usage
      description: API usage tracking.
      operations:
      - method: GET
        name: get-usage
        description: Get API usage data.
        call: zoominfo.lookup-usage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: monitoring-and-compliance-mcp
    transport: http
    description: MCP server for AI-assisted monitoring and compliance management.
    tools:
    - name: create-webhook
      description: Create a new webhook subscription for data change notifications.
      hints:
        readOnly: false
        idempotent: false
      call: zoominfo.create-webhook
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhooks
      description: List all configured webhook subscriptions.
      hints:
        readOnly: true
        idempotent: true
      call: zoominfo.list-webhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update an existing webhook subscription.
      hints:
        readOnly: false
        idempotent: true
      call: zoominfo.update-webhook
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a webhook subscription.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: zoominfo.delete-webhook
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-target-url
      description: Validate a webhook target URL is reachable.
      hints:
        readOnly: true
        idempotent: true
      call: zoominfo.validate-target-url
      outputParameters:
      - type: object
        mapping: $.
    - name: get-subscription-types
      description: Get available webhook subscription types.
      hints:
        readOnly: true
        idempotent: true
      call: zoominfo.get-subscription-types
      outputParameters:
      - type: object
        mapping: $.
    - name: check-compliance
      description: Check data compliance status for specified contacts.
      hints:
        readOnly: true
        openWorld: true
      call: zoominfo.check-compliance
      outputParameters:
      - type: object
        mapping: $.
    - name: get-usage
      description: Get API usage data and consumption metrics.
      hints:
        readOnly: true
        idempotent: true
      call: zoominfo.lookup-usage
      outputParameters:
      - type: object
        mapping: $.
