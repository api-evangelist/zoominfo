      - name: bulk-enrich-contacts
        method: POST
        path: /enrich/contact
        description: Submits a bulk contact enrichment job.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputData: '{{tools.input_data}}'
      - name: bulk-enrich-companies
        method: POST
        path: /enrich/company
        description: Submits a bulk company enrichment job.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
