    - name: webhooks
      path: /webhooks
      description: Webhook management operations.
      operations:
      - name: create-webhook
        method: POST
        path: /
        description: Creates a new webhook subscription.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            targetUrl: '{{tools.target_url}}'
            subscriptionType: '{{tools.subscription_type}}'
      - name: list-webhooks
        method: GET
        path: /
        description: Returns a list of all webhooks.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-webhook
        method: PUT
        path: /{webhookId}
        description: Updates an existing webhook subscription.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
          description: The webhook ID to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            targetUrl: '{{tools.target_url}}'
      - name: delete-webhook
        method: DELETE
        path: /{webhookId}
        description: Deletes a webhook subscription.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
          description: The webhook ID to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-target-url
        method: POST
        path: /validate
        description: Validates a webhook target URL.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            targetUrl: '{{tools.target_url}}'
      - name: get-subscription-types
        method: GET
        path: /subscriptiontypes
        description: Returns the available webhook subscription types.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bulk
      path: /bulk
