naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo Data Enrichment
  description: Unified capability for B2B data enrichment workflows combining contact, company, org chart, corporate hierarchy,
    location, technology, intent, and IP enrichment. Used by sales ops, marketing ops, and data teams to enrich CRM and marketing
    automation records.
  tags:
  - ZoomInfo
  - Data Enrichment
  - CRM Integration
  - B2B Data
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ZOOMINFO_USERNAME: ZOOMINFO_USERNAME
    ZOOMINFO_PASSWORD: ZOOMINFO_PASSWORD
capability:
  consumes:
  - type: http
    namespace: zoominfo
    baseUri: https://api.zoominfo.com
    description: ZoomInfo B2B intelligence API for contact, company, intent, news, scoop, and technographic data.
    authentication:
      type: bearer
      token: '{{ZOOMINFO_JWT_TOKEN}}'
    resources:
    - name: authentication
      path: /
      description: Authentication operations for obtaining JWT tokens.
      operations:
      - name: authenticate
        method: POST
        path: /authenticate
        description: Return a valid JWT access token by inputting your ZoomInfo username and password.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            username: '{{tools.username}}'
            password: '{{tools.password}}'
    - name: contact-search
      path: /search
      description: Search and lookup operations for ZoomInfo contacts.
      operations:
      - name: search-contacts
        method: POST
        path: /contact
        description: Returns a list of contacts from ZoomInfo's data that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
      - name: get-contact-search-inputs
        method: GET
        path: /contact
        description: Returns the available input fields for contact search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-contact-search-outputs
        method: GET
        path: /contact
        description: Returns the available output fields for contact search.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: company-search
      path: /search
      description: Search and lookup operations for ZoomInfo companies.
      operations:
      - name: search-companies
        method: POST
        path: /company
        description: Returns a list of companies from ZoomInfo's data that meet the specified search criteria.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            rpp: '{{tools.rpp}}'
            page: '{{tools.page}}'
      - name: get-company-search-inputs
