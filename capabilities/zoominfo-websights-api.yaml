naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — WebSights API
  description: 'ZoomInfo — WebSights API. 3 operations. Lead operation: Zoominfo Ip Enrich. Self-contained Naftiko capability
    covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - WebSights API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-websights-api
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — WebSights API business capability. Self-contained, no shared references.
    resources:
    - name: enrich-ip
      path: /enrich/ip
      operations:
      - name: ipenrich
        method: POST
        description: Zoominfo Ip Enrich
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lookup-inputfields-ip-enrich
      path: /lookup/inputfields/ip/enrich
      operations:
      - name: ipenrichinputs
        method: GET
        description: Zoominfo Ip Enrich Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-ip-enrich
      path: /lookup/outputfields/ip/enrich
      operations:
      - name: ipenrichoutputs
        method: GET
        description: Zoominfo Ip Enrich Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-websights-api-rest
    port: 8080
    description: REST adapter for ZoomInfo — WebSights API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/enrich/ip
      name: enrich-ip
      description: REST surface for enrich-ip.
      operations:
      - method: POST
        name: ipenrich
        description: Zoominfo Ip Enrich
        call: zoominfo-websights-api.ipenrich
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/inputfields/ip/enrich
      name: lookup-inputfields-ip-enrich
      description: REST surface for lookup-inputfields-ip-enrich.
      operations:
      - method: GET
        name: ipenrichinputs
        description: Zoominfo Ip Enrich Inputs
        call: zoominfo-websights-api.ipenrichinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/ip/enrich
      name: lookup-outputfields-ip-enrich
      description: REST surface for lookup-outputfields-ip-enrich.
      operations:
      - method: GET
        name: ipenrichoutputs
        description: Zoominfo Ip Enrich Outputs
        call: zoominfo-websights-api.ipenrichoutputs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-websights-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — WebSights API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-ip-enrich
      description: Zoominfo Ip Enrich
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zoominfo-websights-api.ipenrich
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-ip-enrich-inputs
      description: Zoominfo Ip Enrich Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-websights-api.ipenrichinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-ip-enrich-outputs
      description: Zoominfo Ip Enrich Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-websights-api.ipenrichoutputs
      outputParameters:
      - type: object
        mapping: $.
