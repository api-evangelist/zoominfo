naftiko: 1.0.0-alpha2
info:
  label: ZoomInfo — News Search
  description: 'ZoomInfo — News Search. 3 operations. Lead operation: Zoominfo News Search Inputs. Self-contained Naftiko
    capability covering one Zoominfo business surface.'
  tags:
  - Zoominfo
  - News Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZOOMINFO_API_KEY: ZOOMINFO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zoominfo-news-search
    baseUri: https://api.zoominfo.com
    description: ZoomInfo — News Search business capability. Self-contained, no shared references.
    resources:
    - name: lookup-inputfields-news-search
      path: /lookup/inputfields/news/search
      operations:
      - name: newssearchinputs
        method: GET
        description: Zoominfo News Search Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-outputfields-news-search
      path: /lookup/outputfields/news/search
      operations:
      - name: newssearchoutputs
        method: GET
        description: Zoominfo News Search Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-news
      path: /search/news
      operations:
      - name: newssearch
        method: POST
        description: Zoominfo News Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ZOOMINFO_API_KEY}}'
  exposes:
  - type: rest
    namespace: zoominfo-news-search-rest
    port: 8080
    description: REST adapter for ZoomInfo — News Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup/inputfields/news/search
      name: lookup-inputfields-news-search
      description: REST surface for lookup-inputfields-news-search.
      operations:
      - method: GET
        name: newssearchinputs
        description: Zoominfo News Search Inputs
        call: zoominfo-news-search.newssearchinputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/outputfields/news/search
      name: lookup-outputfields-news-search
      description: REST surface for lookup-outputfields-news-search.
      operations:
      - method: GET
        name: newssearchoutputs
        description: Zoominfo News Search Outputs
        call: zoominfo-news-search.newssearchoutputs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/news
      name: search-news
      description: REST surface for search-news.
      operations:
      - method: POST
        name: newssearch
        description: Zoominfo News Search
        call: zoominfo-news-search.newssearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zoominfo-news-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZoomInfo — News Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zoominfo-news-search-inputs
      description: Zoominfo News Search Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-news-search.newssearchinputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-news-search-outputs
      description: Zoominfo News Search Outputs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zoominfo-news-search.newssearchoutputs
      outputParameters:
      - type: object
        mapping: $.
    - name: zoominfo-news-search
      description: Zoominfo News Search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zoominfo-news-search.newssearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
